# docker-compose.yml
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: adopciones_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpass
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  postgres_data:
